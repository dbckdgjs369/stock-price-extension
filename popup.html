<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Samsung Stock Widget</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 18px;
        font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), rgba(241, 245, 249, 0.8) 45%, rgba(226, 232, 240, 0.92)),
          linear-gradient(180deg, #f8fafc, #e2e8f0);
        color: #0f172a;
      }

      .panel {
        border-radius: 18px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.24);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
      }

      h1 {
        margin: 6px 0 14px;
        font-size: 21px;
        line-height: 1.1;
      }

      .quote {
        margin-bottom: 16px;
        padding: 14px;
        border-radius: 14px;
        background: rgba(248, 250, 252, 0.9);
      }

      .quote-label {
        font-size: 12px;
        color: #64748b;
      }

      .quote-value {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #334155;
      }

      .control-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
      }

      .button {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 12px 14px;
        background: #0f172a;
        color: #f8fafc;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .hint {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.5;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="eyebrow">Pinned Quote</div>
      <h1>Samsung Electronics</h1>

      <div class="quote">
        <div class="quote-label">현재가</div>
        <div class="quote-value" id="priceValue">--</div>
        <div class="status" id="statusLabel">시세를 불러오는 중</div>
      </div>

      <div class="control-row">
        <label class="toggle" for="widgetToggle">
          <input type="checkbox" id="widgetToggle" />
          <span>페이지 위젯 표시</span>
        </label>
      </div>

      <button class="button" id="placeButton" style="margin-bottom: 10px;">위치 다시 잡기</button>
      <button class="button" id="refreshButton">시세 새로고침</button>
      <div class="hint" id="moveHint"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
