<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Price Widget</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 360px;
        margin: 0;
        padding: 16px;
        font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .panel {
        padding: 16px;
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .subtle {
        margin: 0 0 14px;
        color: #475569;
        font-size: 12px;
        line-height: 1.5;
      }

      .search-row {
        display: flex;
        gap: 8px;
      }

      input {
        flex: 1;
        min-width: 0;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
      }

      button {
        border: none;
        cursor: pointer;
        font-size: 13px;
      }

      .action-button {
        padding: 10px 12px;
        border-radius: 10px;
        background: #0f172a;
        color: #f8fafc;
        font-weight: 600;
      }

      .full-button {
        width: 100%;
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #e2e8f0;
        color: #0f172a;
        font-weight: 600;
      }

      .ghost-button {
        padding: 7px 10px;
        border-radius: 8px;
        background: #e2e8f0;
        color: #0f172a;
      }

      .section {
        margin-top: 16px;
      }

      .section-title {
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
      }

      .status {
        margin-top: 8px;
        min-height: 18px;
        font-size: 12px;
        color: #475569;
      }

      .result-item,
      .widget-item,
      .pending-box {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }

      .result-item + .result-item,
      .widget-item + .widget-item {
        margin-top: 8px;
      }

      .result-title,
      .widget-title {
        font-size: 14px;
        font-weight: 600;
      }

      .result-subtitle,
      .widget-subtitle {
        margin-top: 3px;
        font-size: 12px;
        color: #475569;
      }

      .empty {
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Stock Widgets</h1>
      <p class="subtle">종목을 검색하고 `생성`을 누른 뒤, 웹페이지에서 `Shift + 드래그`로 위젯을 배치합니다. 생성 후에는 `Shift + 드래그`로 이동하고, 우하단 핸들을 `Shift + 드래그`로 크기 조절합니다.</p>

      <form id="searchForm">
        <div class="search-row">
          <input id="searchInput" placeholder="예: 삼성전자, AAPL, TSLA" />
          <button class="action-button" type="submit">검색</button>
        </div>
      </form>

      <div class="status" id="searchStatus"></div>

      <div class="section">
        <div class="section-title">검색 결과</div>
        <div id="searchResults"></div>
        <div id="manualCreate"></div>
      </div>

      <div class="section" id="pendingSection" hidden>
        <div class="section-title">다음 생성</div>
        <div class="pending-box">
          <div id="pendingLabel"></div>
          <button class="ghost-button" id="clearPendingButton" type="button">취소</button>
        </div>
      </div>

      <button class="full-button" id="refreshButton" type="button">시세 새로고침</button>

      <div class="section">
        <div class="section-title">현재 위젯</div>
        <div class="empty" id="widgetEmpty">생성된 위젯이 없습니다.</div>
        <div id="widgetList"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
